<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Domino 5s Master</title>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js"></script>
    <style>
        :root { --gold: #d4af37; --accent: #ff3b30; --green: #32d74b; --bg: #050505; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg) url('domino.png') no-repeat center center fixed; 
            background-size: cover; color: #fff; font-family: sans-serif; overflow: hidden; 
        }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1; }
        #app { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; }

        .header { display: flex; padding: 60px 0 20px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold); }
        .side { flex: 1; text-align: center; }
        .score { font-size: 50px; font-weight: 900; margin: 0; }
        .add-btn { 
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid #fff; 
            background: rgba(255,255,255,0.1); color: #fff; font-size: 35px; 
            margin-top: 10px; cursor: pointer;
        }

        #history { flex: 1; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.4); }
        .row { display: flex; justify-content: space-around; padding: 10px; border-bottom: 1px solid #222; font-size: 24px; }
        
        #cam-layer { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        video { width: 100%; height: 70%; object-fit: cover; }
        .tools { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; gap: 15px; }
        .snap { background: var(--gold); color: #000; padding: 20px 80px; border-radius: 50px; font-weight: bold; font-size: 20px; border: none; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="app">
        <div class="header">
            <div class="side">
                <div style="font-size:12px; color:var(--gold)">HOME</div>
                <div id="h-sum" class="score" style="color:var(--green)">0</div>
                <button class="add-btn" onclick="openCam('h')">+</button>
            </div>
            <div class="side">
                <div style="font-size:12px; color:var(--gold)">VISITOR</div>
                <div id="v-sum" class="score" style="color:var(--accent)">0</div>
                <button class="add-btn" onclick="openCam('v')" style="border-color:var(--accent); color:var(--accent)">+</button>
            </div>
        </div>
        <div id="history"></div>
        <button onclick="location.reload()" style="padding:15px; background:#000; border:none; color:#555; font-size:12px;">إعادة تشغيل / مسح</button>
    </div>

    <div id="cam-layer">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div class="tools">
            <div id="status" style="color:var(--gold)">وجه الكاميرا نحو المالات أو القطع المفتوحة</div>
            <button class="snap" onclick="processAI()">احسب النتيجة (+)</button>
            <button onclick="closeCam()" style="color:#666; background:none; border:none;">إلغاء</button>
        </div>
    </div>

    <script>
        let sH = 0, sV = 0, active = '';
        let stream = null;

        function openCam(s) {
            active = s;
            document.getElementById('cam-layer').style.display = 'flex';
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(st => { stream = st; document.getElementById('video').srcObject = st; });
        }

        function closeCam() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('cam-layer').style.display = 'none';
        }

        function processAI() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);

            try {
                let src = cv.imread(c);
                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                cv.medianBlur(gray, gray, 5);

                let circles = new cv.Mat();
                // كشف الدوائر (النقاط)
                cv.HoughCircles(gray, circles, cv.HOUGH_GRADIENT, 1, 20, 50, 35, 10, 60);

                let points = circles.cols;
                
                // منطق لعبة الـ 5 (الدمبل):
                // إذا كان المجموع 10 (مثل 5/5) أو 12 (مثل 6/6) أو أي مجموع آخر
                // الكود سيحسب النقاط "كما تراها العين" في الإطار
                if (!points) points = 0;

                // إذا كانت بياض بـ 5 (قاعدة خاصة)
                // يمكنك تعديل الرقم يدوياً إذا لم تكن هناك نقاط
                if (points === 0 && confirm("هل هذه بياض بـ 5؟")) points = 5;

                add(points);
                src.delete(); gray.delete(); circles.delete();
                closeCam();
            } catch (e) { alert("انتظر تحميل المحرك.."); }
        }

        function add(n) {
            let vH = 0, vV = 0;
            if (active === 'h') { sH += n; vH = n; }
            else { sV += n; vV = n; }

            document.getElementById('h-sum').innerText = sH;
            document.getElementById('v-sum').innerText = sV;

            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<div>${vH}</div><div>${vV}</div>`;
            document.getElementById('history').appendChild(row);
        }
    </script>
</body>
</html>
