<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Domino Pro Calc</title>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <style>
        :root { --gold: #d4af37; --accent: #ff3b30; --green: #32d74b; --bg: #050505; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        #app { height: 100%; display: flex; flex-direction: column; position: relative; z-index: 10; }
        
        /* واجهة علوية فخمة */
        .header { display: flex; padding: 50px 0 10px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--gold); }
        .side { flex: 1; text-align: center; }
        .score { font-size: 40px; font-weight: 800; margin: 5px 0; }
        .label { font-size: 10px; color: var(--gold); letter-spacing: 1px; }

        /* أزرار الإضافة تحت الأرقام مباشرة */
        .add-trigger {
            width: 50px; height: 50px; border-radius: 50%; border: 1.5px solid #fff;
            display: inline-flex; align-items: center; justify-content: center; font-size: 25px;
            margin-top: 10px; background: rgba(255,255,255,0.05); cursor: pointer;
        }

        .history { flex: 1; overflow-y: auto; padding: 10px 0; }
        .row { display: flex; justify-content: space-around; padding: 8px 0; border-bottom: 1px solid #111; font-size: 18px; color: #888; }
        .row div { width: 40%; text-align: center; }
        .new-val { color: #fff; font-weight: bold; }

        /* شاشة الكاميرا */
        #cam-layer { display: none; position: fixed; inset: 0; background: #000; z-index: 100; flex-direction: column; }
        video { width: 100%; height: 75%; object-fit: cover; }
        .controls { height: 25%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; gap: 10px; }
        .btn-scan { background: var(--gold); color: #000; padding: 15px 50px; border-radius: 30px; font-weight: bold; border: none; font-size: 16px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="side">
                <div class="label">HOME (لك)</div>
                <div id="h-total" class="score" style="color:var(--green)">0</div>
                <div class="add-trigger" onclick="openCam('h')">+</div>
            </div>
            <div class="side">
                <div class="label">VISITOR</div>
                <div id="v-total" class="score" style="color:var(--accent)">0</div>
                <div class="add-trigger" onclick="openCam('v')" style="border-color:var(--accent); color:var(--accent)">+</div>
            </div>
        </div>

        <div id="history" class="history"></div>

        <div style="display:flex; border-top: 1px solid #111;">
            <button onclick="reset()" style="flex:1; padding:15px; background:none; border:none; color:#444; font-size:10px;">RESET</button>
            <button onclick="location.reload()" style="flex:1; padding:15px; background:none; border:none; color:#444; font-size:10px;">REFRESH</button>
        </div>
    </div>

    <div id="cam-layer">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div class="controls">
            <div id="status" style="color:var(--gold); font-size:12px;">جاري القراءة...</div>
            <button class="btn-scan" onclick="process()">التقاط النتيجة</button>
            <button onclick="closeCam()" style="color:#555; background:none; border:none;">إلغاء</button>
        </div>
    </div>

    <script>
        let totalH = 0, totalV = 0, activeSide = '';
        let stream = null;

        function openCam(side) {
            activeSide = side;
            document.getElementById('cam-layer').style.display = 'flex';
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(s => { stream = s; document.getElementById('video').srcObject = s; });
        }

        function closeCam() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('cam-layer').style.display = 'none';
        }

        function process() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            try {
                let src = cv.imread(canvas);
                let gray = new cv.Mat();
                let binary = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                cv.adaptiveThreshold(gray, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let points = 0;
                for (let i = 0; i < contours.size(); ++i) {
                    let area = cv.contourArea(contours.get(i));
                    // تصفية دقيقة للدوائر السوداء
                    if (area > 20 && area < 800) points++;
                }

                src.delete(); gray.delete(); binary.delete(); contours.delete(); hierarchy.delete();
                
                // المنطق الذي طلبته: الحساب المباشر
                addResult(points);
                closeCam();
            } catch (e) { alert("انتظر تحميل الـ AI"); }
        }

        function addResult(val) {
            let vH = 0, vV = 0;
            if(activeSide === 'h') { vH = val; totalH += val; }
            else { vV = val; totalV += val; }

            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<div class="${vH>0?'new-val':''}">${vH}</div><div class="${vV>0?'new-val':''}">${vV}</div>`;
            const h = document.getElementById('history');
            h.appendChild(row);
            h.scrollTop = h.scrollHeight;

            document.getElementById('h-total').innerText = totalH;
            document.getElementById('v-total').innerText = totalV;
        }

        function reset() { if(confirm("تصفير؟")) location.reload(); }
    </script>
</body>
</html>
