<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حاسبة الدومينو الذكية</title>
    <style>
        :root { --accent: #ff3b30; --green: #4cd964; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000 url('domino.png') no-repeat center center fixed;
            background-size: cover; color: white; font-family: sans-serif;
            overflow: hidden;
        }

        /* طبقة تظليل للخلفية */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1; pointer-events: none;
        }

        #app-container { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; }

        /* واجهة الإعدادات */
        .stage { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        .btn-start { 
            background: var(--accent); color: white; border: none; padding: 15px 40px; 
            border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer;
        }

        /* واجهة الحاسبة */
        .calc-ui { flex: 1; display: flex; flex-direction: column; }
        .header { display: flex; background: rgba(0,0,0,0.8); padding: 20px 0; border-bottom: 1px solid #333; }
        .header div { flex: 1; text-align: center; font-size: 22px; font-weight: bold; }

        .score-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .score-row { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 0; font-size: 24px; }
        .score-cell { flex: 1; text-align: center; display: flex; justify-content: center; align-items: center; }
        .x-mark { color: var(--accent); margin: 0 10px; font-weight: bold; }

        .controls { display: flex; justify-content: space-around; padding: 20px; background: rgba(0,0,0,0.5); }
        .add-btn { 
            width: 70px; height: 70px; border-radius: 50%; border: 3px solid white; 
            background: none; color: white; font-size: 35px; cursor: pointer;
        }

        .total-bar { display: flex; justify-content: space-around; background: #000; padding: 20px 0; font-size: 45px; font-weight: bold; }
        
        .restart-btn { background: #333; color: #ccc; border: none; padding: 10px; width: 100%; font-size: 16px; cursor: pointer; }

        /* شاشة الكاميرا */
        #camera-layer { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; z-index: 100; flex-direction: column; 
        }
        video { width: 100%; height: 80%; object-fit: cover; }
        .cam-footer { height: 20%; display: flex; align-items: center; justify-content: center; background: #111; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div id="app-container">
        <div id="setup-stage" class="stage active">
            <h1 style="margin-bottom: 30px;">Domino Calc Pro</h1>
            <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; width: 80%; text-align: center;">
                <p>هدف الفوز:</p>
                <input type="number" id="win-limit" value="151" style="width: 100px; padding: 10px; text-align: center; font-size: 18px;">
            </div>
            <button class="btn-start" onclick="startApp()">ابدأ الحساب</button>
        </div>

        <div id="calc-stage" class="stage calc-ui">
            <div class="header">
                <div>Home (لك)</div>
                <div>Visitor (الخصم)</div>
            </div>
            <div class="controls">
                <button class="add-btn" onclick="openCam('you')">+</button>
                <button class="add-btn" onclick="openCam('opp')">+</button>
            </div>
            <div id="history" class="score-list"></div>
            <div class="total-bar">
                <div id="total-you" style="color: var(--green);">0</div>
                <div id="total-opp" style="color: var(--accent);">0</div>
            </div>
            <button class="restart-btn" onclick="resetScores()">تصفير النتائج (RESTART)</button>
        </div>
    </div>

    <div id="camera-layer">
        <video id="video" autoplay playsinline></video>
        <div class="cam-footer">
            <button class="btn-start" onclick="captureScore()">التقاط وعد النقاط</button>
        </div>
    </div>

    <script>
        let scoreYou = 0, scoreOpp = 0;
        let activeSide = '';
        let stream = null;

        function startApp() {
            document.getElementById('setup-stage').classList.remove('active');
            document.getElementById('calc-stage').classList.add('active');
        }

        async function openCam(side) {
            activeSide = side;
            document.getElementById('camera-layer').style.display = 'flex';
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                document.getElementById('video').srcObject = stream;
            } catch (err) {
                alert("خطأ: الكاميرا تتطلب اتصال HTTPS أو إذن الوصول.");
                document.getElementById('camera-layer').style.display = 'none';
            }
        }

        function captureScore() {
            // هنا نضع رقم عشوائي كمحاكاة لعمل الـ AI
            // لبرمجة AI حقيقي 100% تحتاج مكتبة TensorFlow.js
            let points = Math.floor(Math.random() * 20) + 1;
            
            if (stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('camera-layer').style.display = 'none';
            
            updateScore(activeSide, points);
        }

        function updateScore(side, pts) {
            let pYou = 0, pOpp = 0;
            if (side === 'you') { pYou = pts; scoreYou += pts; }
            else { pOpp = pts; scoreOpp += pts; }

            const row = document.createElement('div');
            row.className = 'score-row';
            row.innerHTML = `
                <div class="score-cell">${pYou === 0 ? '<span class="x-mark">×</span>' : ''} ${pYou}</div>
                <div class="score-cell">${pOpp} ${pOpp === 0 ? '<span class="x-mark">×</span>' : ''}</div>
            `;
            
            const history = document.getElementById('history');
            history.insertBefore(row, history.firstChild);

            document.getElementById('total-you').innerText = scoreYou;
            document.getElementById('total-opp').innerText = scoreOpp;

            let limit = parseInt(document.getElementById('win-limit').value);
            if (scoreYou >= limit) alert("مبروك! لقد فزت.");
            else if (scoreOpp >= limit) alert("حظ أوفر، فاز الخصم.");
        }

        function resetScores() {
            if(confirm("هل أنت متأكد من تصفير النتائج؟")) {
                scoreYou = 0; scoreOpp = 0;
                document.getElementById('total-you').innerText = "0";
                document.getElementById('total-opp').innerText = "0";
                document.getElementById('history').innerHTML = "";
            }
        }
    </script>
</body>
</html>
