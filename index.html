<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Domino AI Vision Pro</title>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <style>
        :root { --gold: #d4af37; --accent: #ff3b30; --green: #32d74b; --bg: #050505; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg) url('domino.png') no-repeat center center fixed; background-size: cover; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent 0%, rgba(0,0,0,0.9) 100%); z-index: 1; pointer-events: none; }
        #app-container { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; }

        .header { display: flex; width: 100%; padding: 60px 0 10px; background: rgba(0,0,0,0.6); }
        .side { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .side h3 { font-size: 12px; color: var(--gold); margin: 0; }
        .total { font-size: 45px; font-weight: 800; margin: 5px 0; }

        /* الأزرار تحت الأرقام مباشرة */
        .add-btn {
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid #fff;
            display: flex; align-items: center; justify-content: center; font-size: 30px;
            background: rgba(255,255,255,0.1); cursor: pointer; margin-top: 5px;
        }

        .history { flex: 1; overflow-y: auto; width: 100%; padding: 20px 0; }
        .row { display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 20px; font-weight: 200; }

        /* واجهة الكاميرا */
        #cam-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        video { width: 100%; height: 75%; object-fit: cover; }
        .cam-ui { height: 25%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; gap: 15px; }
        .scan-btn { background: var(--gold); color: #000; padding: 15px 40px; border-radius: 30px; font-weight: bold; border: none; }
        
        #status { font-size: 12px; color: var(--gold); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="app-container">
        <div class="header">
            <div class="side">
                <h3>HOME (لك)</h3>
                <div id="h-sum" class="total" style="color:var(--green)">0</div>
                <div class="add-btn" onclick="openAI('h')">+</div>
            </div>
            <div class="side" style="border-right: 1px solid rgba(255,255,255,0.1);">
                <h3>VISITOR</h3>
                <div id="v-sum" class="total" style="color:var(--accent)">0</div>
                <div class="add-btn" onclick="openAI('v')" style="border-color:var(--accent); color:var(--accent)">+</div>
            </div>
        </div>

        <div id="history-list" class="history"></div>

        <div style="display:flex; background:#000; border-top:1px solid #222;">
            <button onclick="reset()" style="flex:1; padding:15px; background:none; border:none; color:#444; font-size:11px;">RESTART</button>
            <button onclick="location.reload()" style="flex:1; padding:15px; background:none; border:none; color:#444; font-size:11px;">MENU</button>
        </div>
    </div>

    <div id="cam-screen">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvasOutput" style="display:none;"></canvas>
        <div class="cam-ui">
            <div id="status">جاري تهيئة الذكاء الاصطناعي...</div>
            <button class="scan-btn" onclick="processFrame()">التقاط وتحليل النقاط</button>
            <button onclick="closeCam()" style="color:#fff; background:none; border:none;">إلغاء</button>
        </div>
    </div>

    <script>
        let sH = 0, sV = 0, activeSide = '';
        let stream = null;

        async function openAI(side) {
            activeSide = side;
            document.getElementById('cam-screen').style.display = 'flex';
            document.getElementById('status').innerText = "وجه الكاميرا نحو قطع الدومينو";
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video').srcObject = stream;
            } catch (e) { alert("الكاميرا تتطلب HTTPS"); closeCam(); }
        }

        function closeCam() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('cam-screen').style.display = 'none';
        }

        // وظيفة الذكاء الاصطناعي لتحليل الصورة
        function processFrame() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvasOutput');
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            try {
                let src = cv.imread(canvas);
                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0); // تحويل للرمادي
                cv.threshold(gray, gray, 100, 255, cv.THRESH_BINARY_INV); // عكس الألوان لتمييز النقاط السوداء

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(gray, contours, hierarchy, cv.RETR_CCOMP, cv.CHAIN_APPROX_SIMPLE);

                let dotsCount = 0;
                for (let i = 0; i < contours.size(); ++i) {
                    let area = cv.contourArea(contours.get(i));
                    // تصفية المساحات الصغيرة جداً أو الكبيرة جداً لضمان أنها "نقطة" دومينو فقط
                    if (area > 10 && area < 500) { dotsCount++; }
                }

                // التنظيف
                src.delete(); gray.delete(); contours.delete(); hierarchy.delete();
                
                let finalScore = dotsCount;
                if(finalScore > 40) finalScore = 0; // حماية في حال كانت الإضاءة سيئة

                let confirmScore = prompt(`تم اكتشاف ${finalScore} نقطة. هل الرقم صحيح؟`, finalScore);
                if(confirmScore !== null) {
                    addScore(parseInt(confirmScore));
                    closeCam();
                }
            } catch (err) {
                alert("برجاء الانتظار حتى تحميل مكتبة الذكاء الاصطناعي بالكامل.");
            }
        }

        function addScore(val) {
            let vH = 0, vV = 0;
            if(activeSide === 'h') { vH = val; sH += val; }
            else { vV = val; sV += val; }

            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<div>${vH}</div><div>${vV}</div>`;
            document.getElementById('history-list').appendChild(row);
            
            document.getElementById('h-sum').innerText = sH;
            document.getElementById('v-sum').innerText = sV;
        }

        function reset() {
            if(confirm("تصفير؟")) {
                sH = 0; sV = 0;
                document.getElementById('h-sum').innerText = "0";
                document.getElementById('v-sum').innerText = "0";
                document.getElementById('history-list').innerHTML = "";
            }
        }
    </script>
</body>
</html>
