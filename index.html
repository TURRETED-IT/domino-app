<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domino Master App</title>
    <style>
        :root { --main-red: #ff3b30; --bg-dark: #000; --glass: rgba(255, 255, 255, 0.1); }
        
        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('domino.jpg'); /* ضع صورتك هنا */
            background-size: cover; background-position: center;
            color: white; font-family: sans-serif; margin: 0; overflow: hidden;
        }

        /* المرحلة الأولى: القائمة */
        #menu-stage {
            display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; gap: 20px;
        }

        .btn-main {
            background: var(--glass); border: 2px solid white; padding: 20px 40px;
            font-size: 22px; color: white; border-radius: 15px; width: 250px; cursor: pointer;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .btn-main:hover { background: white; color: black; }

        /* المرحلة الثانية والثالثة: واجهة الحساب */
        #calc-stage { display: none; flex-direction: column; height: 100vh; padding: 10px; }

        .header-titles { display: flex; justify-content: space-around; font-size: 24px; font-weight: bold; padding: 10px 0; }
        .action-row { display: flex; justify-content: space-around; padding: 10px 0; }
        
        .btn-plus {
            background: none; border: 3px solid white; color: white; font-size: 40px;
            width: 60px; height: 60px; border-radius: 50%; cursor: pointer;
        }

        .history-list { flex-grow: 1; overflow-y: auto; border-top: 1px solid #444; margin: 10px 0; }
        .score-row { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid #222; font-size: 20px; }

        .total-section {
            display: flex; justify-content: space-around; font-size: 45px; font-weight: bold;
            padding: 15px; background: rgba(0,0,0,0.6); border-radius: 10px;
        }

        .footer { padding: 10px; display: flex; gap: 10px; }
        .btn-restart { flex: 1; background: var(--main-red); border: none; color: white; padding: 15px; border-radius: 10px; font-size: 18px; cursor: pointer; }

        /* شاشة الكاميرا (محاكاة) */
        #cam-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="menu-stage">
        <h2 style="margin-bottom: 30px;">Domino Master</h2>
        <button class="btn-main" onclick="goToSetup('game')">اللعب (مقابل الروبوت)</button>
        <button class="btn-main" onclick="goToSetup('calc')">الحساب (عد النقاط)</button>
    </div>

    <div id="calc-stage">
        <div class="header-titles">
            <div>لك</div>
            <div>الخصم</div>
        </div>

        <div class="action-row">
            <button class="btn-plus" onclick="triggerCam('you')">+</button>
            <button class="btn-plus" onclick="triggerCam('opp')">+</button>
        </div>

        <div class="history-list" id="score-history"></div>

        <div class="total-section">
            <div id="total-you" style="color: #4cd964;">0</div>
            <div id="total-opp" style="color: #ff3b30;">0</div>
        </div>

        <div class="footer">
            <button class="btn-restart" onclick="location.reload()">RESTART (البداية)</button>
            <button class="btn-restart" style="background:#444" onclick="resetScores()">تصفير النقاط</button>
        </div>
    </div>

    <div id="cam-overlay" onclick="capturePoint()">
        <p>جاري تشغيل الكاميرا الخاصة...</p>
        <p style="font-size: 12px;">(اضغط في أي مكان لمحاكاة عد النقاط بالـ AI)</p>
    </div>

    <script>
        let scoreYou = 0, scoreOpp = 0;
        let winLimit = 151;
        let activeSide = '';

        function goToSetup(mode) {
            if (mode === 'calc') {
                let players = prompt("عدد اللاعبين (2 أو 3 أو 4)؟", "2");
                let limit = prompt("نقاط الفوز (151 أو رقم آخر)؟", "151");
                winLimit = parseInt(limit) || 151;
                
                document.getElementById('menu-stage').style.display = 'none';
                document.getElementById('calc-stage').style.display = 'flex';
            } else {
                alert("نظام اللعب (7-7-14) قيد التطوير حالياً..");
            }
        }

        function triggerCam(side) {
            activeSide = side;
            document.getElementById('cam-overlay').style.display = 'flex';
        }

        function capturePoint() {
            // محاكاة لعمل الـ AI في عد النقاط (رقم عشوائي بين 1-20)
            let detectedScore = Math.floor(Math.random() * 20) + 1;
            document.getElementById('cam-overlay').style.display = 'none';
            addEntry(activeSide, detectedScore);
        }

        function addEntry(side, points) {
            let pYou = 0, pOpp = 0;
            if (side === 'you') {
                pYou = points; scoreYou += points;
            } else {
                pOpp = points; scoreOpp += points;
            }

            const history = document.getElementById('score-history');
            const row = document.createElement('div');
            row.className = 'score-row';
            row.innerHTML = `<div>${pYou}</div><div>${pOpp}</div>`;
            history.insertBefore(row, history.firstChild); // الإضافة للطول (لأعلى)

            document.getElementById('total-you').innerText = scoreYou;
            document.getElementById('total-opp').innerText = scoreOpp;

            if (scoreYou >= winLimit || scoreOpp >= winLimit) {
                alert("انتهت اللعبة! الفائز وصل إلى " + winLimit);
            }
        }

        function resetScores() {
            scoreYou = 0; scoreOpp = 0;
            document.getElementById('total-you').innerText = "0";
            document.getElementById('total-opp').innerText = "0";
            document.getElementById('score-history').innerHTML = "";
        }
    </script>
</body>
</html>
