<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Domino Royal Elite</title>
    <style>
        :root {
            --accent: #ff3b30;
            --gold: #d4af37;
            --green: #34c759;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-heavy: rgba(0, 0, 0, 0.8);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #050505 url('domino.png') no-repeat center center fixed;
            background-size: cover; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* طبقة تظليل سينمائية */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%);
            z-index: 1; pointer-events: none;
        }

        #app-container { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; }

        /* الشاشات بنظام الأنميشن */
        .stage { 
            display: none; height: 100%; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }

        /* كرت الإعدادات الفخم */
        .premium-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 35px; padding: 40px 20px;
            width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-weight: 200; letter-spacing: 2px; margin-bottom: 30px; color: var(--gold); }

        .input-box {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 15px; margin: 15px 0; color: #fff;
            width: 100%; box-sizing: border-box; font-size: 18px; text-align: center;
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #f9d976 100%);
            color: #000; border: none; padding: 18px; border-radius: 18px;
            font-size: 18px; font-weight: bold; width: 100%; cursor: pointer;
            margin-top: 20px; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        /* واجهة الحاسبة (Scoreboard) */
        .main-header {
            display: flex; width: 100%; padding: 60px 0 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }
        .user-tab { flex: 1; text-align: center; }
        .user-tab h3 { margin: 0; font-size: 24px; font-weight: 300; }
        .user-tab span { font-size: 12px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }

        .score-scroll { flex: 1; overflow-y: auto; width: 100%; mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent); }
        .score-item { 
            display: flex; justify-content: space-around; padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 28px; font-weight: 200;
        }

        .action-circle {
            width: 85px; height: 85px; border-radius: 50%;
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px); color: #fff; font-size: 40px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .action-circle:active { transform: scale(0.85); background: var(--accent); }

        .total-display {
            display: flex; width: 100%; background: var(--glass-heavy);
            padding: 30px 0; border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 55px; font-weight: 100; justify-content: space-around;
        }

        .floating-footer { display: flex; gap: 2px; width: 100%; background: #111; }
        .f-btn { flex: 1; padding: 20px; background: #0a0a0a; border: none; color: #555; font-size: 12px; letter-spacing: 1px; }

        /* الكاميرا */
        #cam-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        .shutter {
            width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff;
            background: transparent; position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%); display: flex; align-items: center; justify-content: center;
        }
        .shutter-inner { width: 60px; height: 60px; background: var(--accent); border-radius: 50%; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div id="app-container">
        <div id="stage-setup" class="stage active">
            <div class="premium-card">
                <img src="icon.png" width="80" style="margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--gold));">
                <h1>DOMINO ROYAL</h1>
                <div style="text-align: right; font-size: 14px; opacity: 0.6; margin-bottom: 5px;">هدف الفوز</div>
                <input type="number" id="goal" class="input-box" value="151">
                
                <div style="text-align: right; font-size: 14px; opacity: 0.6; margin-bottom: 5px; margin-top: 10px;">عدد اللاعبين</div>
                <select id="p-count" class="input-box">
                    <option value="2">لاعبين (2)</option>
                    <option value="4">أربعة لاعبين (4)</option>
                </select>
                
                <button class="btn-gold" onclick="launch()">بدء التجربة الملكية</button>
            </div>
        </div>

        <div id="stage-main" class="stage" style="padding:0; justify-content: flex-start;">
            <div class="main-header">
                <div class="user-tab">
                    <span>Master</span>
                    <h3>Home (لك)</h3>
                </div>
                <div class="user-tab">
                    <span>Opponent</span>
                    <h3>Visitor</h3>
                </div>
            </div>

            <div style="display: flex; width: 100%; justify-content: space-around; margin: 30px 0;">
                <div class="action-circle" onclick="openScanner('home')">+</div>
                <div class="action-circle" onclick="openScanner('visit')">+</div>
            </div>

            <div id="score-history" class="score-scroll"></div>

            <div class="total-display">
                <div id="h-total" style="color: var(--green);">0</div>
                <div id="v-total" style="color: var(--accent);">0</div>
            </div>

            <div class="floating-footer">
                <button class="f-btn" onclick="resetData()">مسح الجولة</button>
                <button class="f-btn" onclick="location.reload()">القائمة</button>
            </div>
        </div>
    </div>

    <div id="cam-overlay">
        <video id="webcam" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
        <div class="shutter" onclick="scanNow()"><div class="shutter-inner"></div></div>
    </div>

    <script>
        let hScore = 0, vScore = 0;
        let sideTrack = '';
        let camStream = null;

        function launch() {
            document.getElementById('stage-setup').classList.remove('active');
            document.getElementById('stage-main').classList.add('active');
        }

        async function openScanner(side) {
            sideTrack = side;
            document.getElementById('cam-overlay').style.display = 'block';
            try {
                camStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", focusMode: "continuous" } 
                });
                document.getElementById('webcam').srcObject = camStream;
            } catch (e) {
                alert("يرجى تفعيل الكاميرا عبر HTTPS");
                document.getElementById('cam-overlay').style.display = 'none';
            }
        }

        function scanNow() {
            let res = Math.floor(Math.random() * 20) + 1; // محاكاة العد الذكي
            if(camStream) camStream.getTracks().forEach(t => t.stop());
            document.getElementById('cam-overlay').style.display = 'none';
            postScore(sideTrack, res);
        }

        function postScore(side, val) {
            let hVal = 0, vVal = 0;
            if(side === 'home') { hVal = val; hScore += val; }
            else { vVal = val; vScore += val; }

            const item = document.createElement('div');
            item.className = 'score-item';
            item.innerHTML = `
                <div style="color:${hVal>0?'#fff':'#444'}">${hVal || '×'}</div>
                <div style="color:${vVal>0?'#fff':'#444'}">${vVal || '×'}</div>
            `;
            
            const box = document.getElementById('score-history');
            box.insertBefore(item, box.firstChild);

            document.getElementById('h-total').innerText = hScore;
            document.getElementById('v-total').innerText = vScore;

            let target = parseInt(document.getElementById('goal').value);
            if(hScore >= target) alert("الملك يفوز! (Home)");
            else if(vScore >= target) alert("الخصم يتفوق! (Visitor)");
        }

        function resetData() {
            if(confirm("هل تود تصفير السجل؟")) {
                hScore = 0; vScore = 0;
                document.getElementById('h-total').innerText = "0";
                document.getElementById('v-total').innerText = "0";
                document.getElementById('score-history').innerHTML = "";
            }
        }
    </script>
</body>
</html>
