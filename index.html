<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Domino AI Vision - Stable</title>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js"></script>
    <style>
        :root { --gold: #d4af37; --accent: #ff3b30; --green: #32d74b; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* واجهة المستخدم */
        .header { display: flex; padding: 50px 0 15px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--gold); }
        .side { flex: 1; text-align: center; }
        .score { font-size: 40px; font-weight: bold; margin: 0; }
        .add-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; background: rgba(255,255,255,0.05); color: #fff; font-size: 30px; margin-top: 10px; cursor: pointer; }

        /* شاشة الكاميرا */
        #cam-layer { display: none; position: fixed; inset: 0; background: #000; z-index: 100; flex-direction: column; }
        video { width: 100%; height: 70%; object-fit: cover; border-bottom: 2px solid var(--gold); }
        .controls { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; gap: 20px; }
        .snap-btn { background: var(--gold); border: none; padding: 20px 60px; border-radius: 40px; font-weight: bold; font-size: 20px; box-shadow: 0 0 20px rgba(212,175,55,0.5); }
        
        #history { flex: 1; overflow-y: auto; padding: 10px; border-top: 1px solid #111; }
        .row { display: flex; justify-content: space-around; padding: 10px; border-bottom: 1px solid #111; color: #555; }
        .active-val { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div class="side">
            <div style="font-size: 10px; color: var(--gold);">HOME</div>
            <div id="h-total" class="score" style="color:var(--green)">0</div>
            <button class="add-btn" onclick="openCam('h')">+</button>
        </div>
        <div class="side">
            <div style="font-size: 10px; color: var(--gold);">VISITOR</div>
            <div id="v-total" class="score" style="color:var(--accent)">0</div>
            <button class="add-btn" onclick="openCam('v')" style="border-color:var(--accent); color:var(--accent)">+</button>
        </div>
    </div>

    <div id="history"></div>

    <div id="cam-layer">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div class="controls">
            <div id="status" style="color:var(--gold); font-size: 14px;">ضع قطعة واحدة فقط في الإطار</div>
            <button class="snap-btn" onclick="detectDots()">قراءة وإضافة (+)</button>
            <button onclick="closeCam()" style="color:#666; background:none; border:none;">إلغاء</button>
        </div>
    </div>

    <script>
        let scoreH = 0, scoreV = 0, currentSide = '';
        let stream = null;

        function openCam(side) {
            currentSide = side;
            document.getElementById('cam-layer').style.display = 'flex';
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", focusMode: "continuous" } })
                .then(s => { stream = s; document.getElementById('video').srcObject = s; });
        }

        function closeCam() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('cam-layer').style.display = 'none';
        }

        function detectDots() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            ctx.drawImage(v, 0, 0);

            try {
                let src = cv.imread(c);
                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                
                // تنعيم الصورة لتقليل الضوضاء (الرقم 91 وما شابهه)
                cv.medianBlur(gray, gray, 5);

                // خوارزمية كشف الدوائر (Hough Circles)
                // هي الوحيدة التي تضمن أن المحسوب هو "نقطة" وليس "ظل"
                let circles = new cv.Mat();
                cv.HoughCircles(gray, circles, cv.HOUGH_GRADIENT, 1, 25, 50, 35, 15, 50);

                let dots = circles.cols; 

                // منطق الحماية: إذا كان العدد غير منطقي (أكبر من 12) أو لم يجد شيئاً
                if (!dots || dots > 12) dots = 0;

                applyPoints(dots);

                // تنظيف الذاكرة
                src.delete(); gray.delete(); circles.delete();
                closeCam();
            } catch (e) { alert("المحرك الذكي لا يزال قيد التحميل..."); }
        }

        function applyPoints(n) {
            let vH = 0, vV = 0;
            if (currentSide === 'h') { scoreH += n; vH = n; }
            else { scoreV += n; vV = n; }

            document.getElementById('h-total').innerText = scoreH;
            document.getElementById('v-total').innerText = scoreV;

            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<div class="${vH>0?'active-val':''}">${vH}</div><div class="${vV>0?'active-val':''}">${vV}</div>`;
            const hist = document.getElementById('history');
            hist.appendChild(row);
            hist.scrollTop = hist.scrollHeight;
        }
    </script>
</body>
</html>
