<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Domino AI Vision Pro</title>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <style>
        :root { --gold: #d4af37; --accent: #ff3b30; --green: #32d74b; --bg: #050505; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg) url('domino.png') no-repeat center center fixed; background-size: cover; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        .overlay { position: fixed; inset: 0; background: radial-gradient(circle, transparent 0%, rgba(0,0,0,0.95) 100%); z-index: 1; pointer-events: none; }
        #app-container { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; }

        /* الهيدر مع الأزرار تحته مباشرة */
        .header { display: flex; width: 100%; padding: 50px 0 10px; background: rgba(0,0,0,0.8); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .side h3 { font-size: 11px; color: var(--gold); margin: 0; letter-spacing: 1px; }
        .total { font-size: 45px; font-weight: 800; margin: 2px 0; }
        
        .add-btn {
            width: 60px; height: 60px; border-radius: 50%; border: 1.5px solid var(--green);
            display: flex; align-items: center; justify-content: center; font-size: 32px;
            background: rgba(50, 215, 75, 0.1); cursor: pointer; transition: 0.2s;
        }
        .add-btn:active { transform: scale(0.9); background: var(--green); color: #000; }

        .history { flex: 1; overflow-y: auto; width: 100%; padding: 10px 0; display: flex; flex-direction: column; }
        .row { display: flex; justify-content: space-around; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 22px; font-weight: 200; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }

        /* شاشة الكاميرا */
        #cam-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; flex-direction: column; }
        video { width: 100%; height: 75%; object-fit: cover; }
        .cam-tools { height: 25%; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .capture-pill { background: var(--gold); color: #000; padding: 18px 50px; border-radius: 40px; font-weight: 900; border: none; font-size: 18px; box-shadow: 0 0 20px rgba(212,175,55,0.4); }
        
        .footer-bar { display: flex; background: #000; border-top: 1px solid #111; }
        .footer-bar button { flex: 1; padding: 15px; background: none; border: none; color: #444; font-size: 10px; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="app-container">
        <div class="header">
            <div class="side">
                <h3>HOME (لك)</h3>
                <div id="h-total" class="total" style="color:var(--green)">0</div>
                <div class="add-btn" onclick="startVision('h')">+</div>
            </div>
            <div class="side" style="border-right: 1px solid rgba(255,255,255,0.1);">
                <h3>VISITOR</h3>
                <div id="v-total" class="total" style="color:var(--accent)">0</div>
                <div class="add-btn" onclick="startVision('v')" style="border-color:var(--accent); color:var(--accent); background:rgba(255,59,48,0.1);">+</div>
            </div>
        </div>

        <div id="score-list" class="history"></div>

        <div class="footer-bar">
            <button onclick="resetApp()">RESTART GAME</button>
            <button onclick="location.reload()">REFRESH</button>
        </div>
    </div>

    <div id="cam-overlay">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="procCanvas" style="display:none;"></canvas>
        <div class="cam-tools">
            <div id="ai-status" style="color:var(--gold); font-size:12px;">جاري تشغيل محرك الرؤية...</div>
            <button class="capture-pill" onclick="analyzeAndAdd()">التقاط النقاط (+) </button>
            <button onclick="stopVision()" style="color:#666; background:none; border:none;">إلغاء</button>
        </div>
    </div>

    <script>
        let totalH = 0, totalV = 0, currentSide = '';
        let camStream = null;

        async function startVision(side) {
            currentSide = side;
            document.getElementById('cam-overlay').style.display = 'flex';
            try {
                camStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", focusMode: "continuous", zoom: 1 } 
                });
                document.getElementById('webcam').srcObject = camStream;
                document.getElementById('ai-status').innerText = "وجه الكاميرا بدقة نحو النقاط السوداء";
            } catch (e) { alert("يجب السماح بالكاميرا عبر HTTPS"); stopVision(); }
        }

        function stopVision() {
            if(camStream) camStream.getTracks().forEach(t => t.stop());
            document.getElementById('cam-overlay').style.display = 'none';
        }

        function analyzeAndAdd() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('procCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            try {
                let src = cv.imread(canvas);
                let gray = new cv.Mat();
                let binary = new cv.Mat();
                
                // تحسين الصورة برمجياً للتركيز على النقاط فقط
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
                // استخدام Adaptive Threshold للتعامل مع الإضاءة المتغيرة
                cv.adaptiveThreshold(gray, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let pointsFound = 0;
                for (let i = 0; i < contours.size(); ++i) {
                    let area = cv.contourArea(contours.get(i));
                    let rect = cv.boundingRect(contours.get(i));
                    let ratio = rect.width / rect.height;

                    // معايير النقطة السوداء الحقيقية (مساحة دائرية وشكل مربع تقريباً)
                    if (area > 15 && area < 600 && ratio > 0.7 && ratio < 1.3) {
                        pointsFound++;
                    }
                }

                // التنظيف الميموري (مهم جداً في الـ IT)
                src.delete(); gray.delete(); binary.delete(); contours.delete(); hierarchy.delete();

                // إضافة النتيجة فوراً
                updateScores(pointsFound);
                stopVision();

            } catch (err) {
                alert("محرك AI لا يزال قيد التحميل.. انتظر ثانية وحاول مجدداً");
            }
        }

        function updateScores(pts) {
            let valH = 0, valV = 0;
            if(currentSide === 'h') { valH = pts; totalH += pts; }
            else { valV = pts; totalV += pts; }

            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <div style="color:${valH > 0 ? '#fff' : '#444'}">${valH}</div>
                <div style="color:${valV > 0 ? '#fff' : '#444'}">${valV}</div>
            `;
            const list = document.getElementById('score-list');
            list.appendChild(row);
            list.scrollTop = list.scrollHeight;

            document.getElementById('h-total').innerText = totalH;
            document.getElementById('v-total').innerText = totalV;
        }

        function resetApp() {
            if(confirm("هل تريد تصفير اللعبة بالكامل؟")) {
                totalH = 0; totalV = 0;
                document.getElementById('h-total').innerText = "0";
                document.getElementById('v-total').innerText = "0";
                document.getElementById('score-list').innerHTML = "";
            }
        }
    </script>
</body>
</html>
