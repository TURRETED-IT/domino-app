<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Domino 5s Calculator Pro</title>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js"></script>
    <style>
        :root { --gold: #d4af37; --accent: #ff3b30; --green: #32d74b; --bg: #050505; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg) url('domino.png') no-repeat center center fixed; 
            background-size: cover; color: #fff; font-family: sans-serif; overflow: hidden; 
        }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1; }
        #app { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; }

        /* واجهة النتائج العلوي */
        .header { display: flex; padding: 60px 0 20px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold); }
        .side { flex: 1; text-align: center; }
        .score { font-size: 55px; font-weight: 900; margin: 0; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .label { font-size: 12px; color: var(--gold); letter-spacing: 2px; }

        /* أزرار الإضافة */
        .add-btn { 
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid #fff; 
            background: rgba(255,255,255,0.1); color: #fff; font-size: 35px; 
            margin-top: 15px; cursor: pointer; transition: 0.2s;
        }
        .add-btn:active { transform: scale(0.9); background: var(--gold); color: #000; }

        /* سجل الحركات */
        #history { flex: 1; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.5); }
        .row { display: flex; justify-content: space-around; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 24px; color: #666; }
        .row .last-val { color: #fff; font-weight: bold; }

        /* شاشة الكاميرا والـ AI */
        #cam-layer { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        video { width: 100%; height: 75%; object-fit: cover; }
        .tools { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; gap: 20px; }
        .snap { background: var(--gold); color: #000; padding: 20px 80px; border-radius: 50px; font-weight: 900; font-size: 20px; border: none; box-shadow: 0 0 30px rgba(212,175,55,0.4); }

        /* التصفير */
        .footer { background: #000; display: flex; border-top: 1px solid #222; }
        .reset-btn { flex: 1; padding: 15px; background: none; border: none; color: #444; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div id="app">
        <div class="header">
            <div class="side">
                <div class="label">HOME (لك)</div>
                <div id="h-sum" class="score" style="color:var(--green)">0</div>
                <button class="add-btn" onclick="openCam('h')">+</button>
            </div>
            <div class="side">
                <div class="label">VISITOR</div>
                <div id="v-sum" class="score" style="color:var(--accent)">0</div>
                <button class="add-btn" onclick="openCam('v')" style="border-color:var(--accent); color:var(--accent)">+</button>
            </div>
        </div>

        <div id="history"></div>

        <div class="footer">
            <button class="reset-btn" onclick="confirmReset()">إعادة تعيين اللعبة (RESTART)</button>
        </div>
    </div>

    <div id="cam-layer">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div class="tools">
            <div id="status" style="color:var(--gold); font-size:14px;">وجه الكاميرا على أطراف اللعبة المفتوحة</div>
            <button class="snap" onclick="calculateAI()">التقاط وحساب (+)</button>
            <button onclick="closeCam()" style="color:#666; background:none; border:none;">إلغاء</button>
        </div>
    </div>

    <script>
        let totalH = 0, totalV = 0, side = '';
        let stream = null;

        function openCam(s) {
            side = s;
            document.getElementById('cam-layer').style.display = 'flex';
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", focusMode: "continuous" } })
                .then(st => { stream = st; document.getElementById('video').srcObject = st; });
        }

        function closeCam() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('cam-layer').style.display = 'none';
        }

        function calculateAI() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);

            try {
                let src = cv.imread(c);
                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                cv.medianBlur(gray, gray, 5);

                let circles = new cv.Mat();
                // كشف الدوائر (النقاط السوداء)
                cv.HoughCircles(gray, circles, cv.HOUGH_GRADIENT, 1, 22, 50, 35, 12, 55);

                let pointsFound = circles.cols;
                
                // منطق لعبة الـ 5 (الدمبل):
                // إذا لم يجد نقاط (بياض)، يسأل المستخدم للتأكيد إذا كانت بـ 5
                if (!pointsFound || pointsFound === 0) {
                    if (confirm("لم أجد نقاطاً، هل هي قطعة (بياض) تُحسب بـ 5؟")) {
                        pointsFound = 5;
                    } else {
                        pointsFound = 0;
                    }
                }

                addPoints(pointsFound);
                src.delete(); gray.delete(); circles.delete();
                closeCam();
            } catch (e) { alert("المحرك الذكي لا يزال قيد التحميل.."); }
        }

        function addPoints(val) {
            let vH = 0, vV = 0;
            if (side === 'h') { totalH += val; vH = val; }
            else { totalV += val; vV = val; }

            document.getElementById('h-sum').innerText = totalH;
            document.getElementById('v-sum').innerText = totalV;

            // إضافة السجل
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<div class="${vH>0?'last-val':''}">${vH}</div><div class="${vV>0?'last-val':''}">${vV}</div>`;
            const hist = document.getElementById('history');
            hist.appendChild(row);
            hist.scrollTop = hist.scrollHeight;
        }

        function confirmReset() {
            if(confirm("هل تريد مسح جميع النقاط والبدء من جديد؟")) {
                location.reload();
            }
        }
    </script>
</body>
</html>
