<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Domino Royal AI - Full Edition</title>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js"></script>
    <style>
        :root { --gold: #d4af37; --accent: #ff3b30; --green: #32d74b; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* الهيدر وفصل الأزرار */
        .header { display: flex; padding: 50px 0 15px; background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--gold); }
        .side { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .score { font-size: 42px; font-weight: 800; margin: 0; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
        .label { font-size: 11px; color: var(--gold); letter-spacing: 1px; margin-bottom: 5px; }
        
        .add-btn { 
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; 
            background: rgba(255,255,255,0.05); color: #fff; font-size: 32px; 
            margin-top: 10px; cursor: pointer; transition: 0.2s;
        }
        .add-btn:active { transform: scale(0.9); background: var(--gold); color: #000; }

        /* سجل النتائج (يضاف للأسفل) */
        #history { flex: 1; overflow-y: auto; padding: 15px; background: rgba(255,255,255,0.02); }
        .row { display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 1px solid #111; font-size: 20px; color: #444; }
        .row .active-num { color: #fff; font-weight: bold; }

        /* شاشة الكاميرا */
        #cam-layer { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        video { width: 100%; height: 70%; object-fit: cover; }
        .cam-ui { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; gap: 20px; }
        .snap { background: var(--gold); border: none; padding: 18px 60px; border-radius: 40px; font-weight: bold; font-size: 20px; box-shadow: 0 0 25px rgba(212,175,55,0.4); }
        
        /* شاشة البداية (اختيار الهدف) */
        #setup { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .setup-card { background: #111; padding: 30px; border-radius: 25px; border: 1px solid var(--gold); text-align: center; }
    </style>
</head>
<body>

    <div id="setup">
        <div class="setup-card">
            <h2 style="color:var(--gold); font-weight: 200;">DOMINO ROYAL</h2>
            <p style="font-size: 12px; color: #666;">هدف الفوز</p>
            <input type="number" id="limit" value="151" style="background:#000; border:1px solid #333; color:#fff; padding:10px; width:80px; text-align:center; border-radius:10px; font-size:20px;">
            <button onclick="startApp()" style="display:block; width:100%; margin-top:20px; background:var(--gold); border:none; padding:15px; border-radius:12px; font-weight:bold;">ابدأ اللعب</button>
        </div>
    </div>

    <div id="main-ui" style="display:none; height: 100vh; flex-direction: column;">
        <div class="header">
            <div class="side">
                <div class="label">HOME (لك)</div>
                <div id="h-total" class="score" style="color:var(--green)">0</div>
                <button class="add-btn" onclick="openCam('h')">+</button>
            </div>
            <div class="side" style="border-right: 1px solid #222;">
                <div class="label">VISITOR</div>
                <div id="v-total" class="score" style="color:var(--accent)">0</div>
                <button class="add-btn" onclick="openCam('v')" style="border-color:var(--accent); color:var(--accent)">+</button>
            </div>
        </div>

        <div id="history"></div>

        <div style="display:flex; background:#000; border-top:1px solid #111;">
            <button onclick="location.reload()" style="flex:1; padding:15px; background:none; border:none; color:#444; font-size:11px;">إعادة تعيين</button>
        </div>
    </div>

    <div id="cam-layer">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div class="cam-ui">
            <div id="status" style="color:var(--gold); font-size: 14px;">ضع القطعة في منتصف الشاشة</div>
            <button class="snap" onclick="runAI()">التقاط النتيجة (+)</button>
            <button onclick="closeCam()" style="color:#444; background:none; border:none;">إلغاء</button>
        </div>
    </div>

    <script>
        let scoreH = 0, scoreV = 0, side = '';
        let stream = null;

        function startApp() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
        }

        function openCam(s) {
            side = s;
            document.getElementById('cam-layer').style.display = 'flex';
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", focusMode: "continuous" } })
                .then(st => { stream = st; document.getElementById('video').srcObject = st; });
        }

        function closeCam() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('cam-layer').style.display = 'none';
        }

        function runAI() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);

            try {
                let src = cv.imread(c);
                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY, 0);
                cv.medianBlur(gray, gray, 5); // تنظيف الضوضاء (منع الرقم 91)

                let circles = new cv.Mat();
                // كشف الدوائر فقط (النقاط السوداء)
                cv.HoughCircles(gray, circles, cv.HOUGH_GRADIENT, 1, 25, 50, 35, 15, 55);

                let result = circles.cols;
                if (!result || result > 12) result = 0; // حماية ضد الأرقام الوهمية

                addScore(result);
                src.delete(); gray.delete(); circles.delete();
                closeCam();
            } catch (e) { alert("المحرك الذكي يتحمل.. انتظر ثانية"); }
        }

        function addScore(n) {
            let vH = 0, vV = 0;
            if (side === 'h') { scoreH += n; vH = n; }
            else { scoreV += n; vV = n; }

            document.getElementById('h-total').innerText = scoreH;
            document.getElementById('v-total').innerText = scoreV;

            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<div class="${vH>0?'active-num':''}">${vH}</div><div class="${vV>0?'active-num':''}">${vV}</div>`;
            const h = document.getElementById('history');
            h.appendChild(row);
            h.scrollTop = h.scrollHeight;

            let win = parseInt(document.getElementById('limit').value);
            if(scoreH >= win) alert("الفائز: HOME!");
            else if(scoreV >= win) alert("الفائز: VISITOR!");
        }
    </script>
</body>
</html>
